  </g>
  <g filter="url(#shadow)">
    <rect x="114" y="316" width="1052" height="286" rx="8" fill="#fbfff7"/>
    <rect x="152" y="354" width="392" height="210" rx="6" fill="#07100d"/>
    <text x="178" y="402" fill="#b6f4c4" font-family="SF Mono, Menlo, monospace" font-size="20" font-weight="700">&gt; a fox under aurora</text>
