<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Imago generated project cover</title>
  <desc id="desc">A generated editorial cover for Imago, an AI image generation site that turns prompts into pictures.</desc>
  <defs>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0v52" fill="none" stroke="#dfff3f" stroke-opacity=".1" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx=".68" cy=".3" r=".76">
      <stop offset="0" stop-color="#dfff3f" stop-opacity=".22"/>
      <stop offset=".42" stop-color="#b6f4c4" stop-opacity=".08"/>
      <stop offset="1" stop-color="#07100d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07100d"/>
      <stop offset=".64" stop-color="#123b2e"/>
      <stop offset="1" stop-color="#07100d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#000" flood-opacity=".32"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#grid)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
