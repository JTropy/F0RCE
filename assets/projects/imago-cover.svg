    <path d="M610 446l22 13-22 13" fill="none" stroke="#ff3f2d" stroke-width="10" stroke-linecap="square"/>
    <rect x="654" y="354" width="434" height="210" rx="6" fill="#07100d"/>
    <path d="M674 396Q860 356 1066 392" fill="none" stroke="#ff3f2d" stroke-width="6" stroke-opacity=".8"/>
    <circle cx="960" cy="414" r="36" fill="#dfff3f"/>
