<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Hexagon generated project cover</title>
  <desc id="desc">A generated editorial cover for Hexagon with tabletop seats and hex board cells.</desc>
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0v64" fill="none" stroke="#dfff3f" stroke-opacity=".1" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07100d"/>
      <stop offset=".56" stop-color="#111713"/>
      <stop offset="1" stop-color="#11251d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#000" flood-opacity=".38"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#grid)"/>
  <g opacity=".8">
    <path d="M110 160h846v500H110z" fill="none" stroke="#fbfff7" stroke-opacity=".18" stroke-width="2"/>
    <path d="M110 400h846M533 160v500" stroke="#fbfff7" stroke-opacity=".1" stroke-width="2"/>
  </g>
  <g filter="url(#shadow)">
