    <text x="830" y="286" fill="#fbfff7" font-family="Songti SC, STSong, serif" font-size="72" font-weight="800">进入</text>
    <rect x="830" y="342" width="216" height="52" rx="5" fill="none" stroke="#fbfff7" stroke-opacity=".28"/>
    <rect x="830" y="430" width="216" height="52" rx="5" fill="#dfff3f"/>
    <text x="900" y="464" fill="#07100d" font-family="PingFang SC, sans-serif" font-size="18" font-weight="800">进入大厅</text>
  </g>
